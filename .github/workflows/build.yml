name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: go-proxy-ipv6-pool-linux-amd64
          - goos: linux
            goarch: arm64
            name: go-proxy-ipv6-pool-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }} -X main.buildTime=${BUILD_TIME}" \
            -o "dist/${{ matrix.name }}" .
          chmod +x "dist/${{ matrix.name }}"

      - name: Show version
        if: matrix.goarch == 'amd64'
        run: "dist/${{ matrix.name }} --version"

      - name: Verify cross-built version metadata
        if: matrix.goarch != 'amd64'
        run: |
          file "dist/${{ matrix.name }}"
          strings "dist/${{ matrix.name }}" | grep -F "${{ github.ref_name }}"
          strings "dist/${{ matrix.name }}" | grep -F "${{ github.sha }}"

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}
            dist/${{ matrix.name }}.sha256

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/go-proxy-ipv6-pool-linux-amd64
            dist/go-proxy-ipv6-pool-linux-amd64.sha256
            dist/go-proxy-ipv6-pool-linux-arm64
            dist/go-proxy-ipv6-pool-linux-arm64.sha256
          generate_release_notes: true
